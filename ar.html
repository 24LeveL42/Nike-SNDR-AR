<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Nike SNDR – AR Try-On</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: Arial, sans-serif; }
    video { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
    canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 1; touch-action: none; }

    #loading {
      position: fixed; inset: 0; background: #000; z-index: 999;
      display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff;
    }
    #loading h1 { font-size: 2.5rem; font-weight: 900; letter-spacing: 4px; }
    #loading p { font-size: 0.7rem; letter-spacing: 5px; color: #888; margin: 8px 0 32px; }
    #bar-wrap { width: 180px; height: 2px; background: #222; }
    #bar { height: 100%; width: 0%; background: #e8ff00; transition: width 0.3s; }
    #load-txt { margin-top: 16px; font-size: 0.65rem; color: #555; letter-spacing: 2px; }

    #ui {
      position: fixed; inset: 0; z-index: 10; pointer-events: none;
      display: flex; flex-direction: column; justify-content: space-between;
    }
    #top { padding: 20px 20px; background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent); }
    #top .brand { font-size: 1rem; font-weight: 900; letter-spacing: 3px; color: #fff; }
    #top .sub { font-size: 0.6rem; letter-spacing: 4px; color: #aaa; }

    #colors {
      position: fixed; right: 16px; top: 50%; transform: translateY(-50%);
      display: flex; flex-direction: column; gap: 10px; z-index: 11; pointer-events: auto;
    }
    .sw {
      width: 36px; height: 36px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.4); cursor: pointer;
      transition: border-color 0.2s, transform 0.2s;
    }
    .sw.on { border-color: #e8ff00; transform: scale(1.2); }

    #bottom {
      padding: 16px 20px 36px;
      background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      pointer-events: auto;
    }
    #hint {
      font-size: 0.65rem; letter-spacing: 2px; color: #ccc;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
      padding: 9px 18px; border-radius: 100px;
    }
    #controls { display: flex; gap: 10px; align-items: center; width: 100%; max-width: 320px; }
    #controls span { font-size: 0.6rem; color: #888; letter-spacing: 1px; white-space: nowrap; }
    #sz { flex: 1; accent-color: #e8ff00; }
    #resetBtn {
      background: #e8ff00; color: #000; border: none;
      font-size: 0.6rem; font-weight: 900; letter-spacing: 2px;
      padding: 9px 16px; border-radius: 100px; cursor: pointer;
    }
  </style>
</head>
<body>

<div id="loading">
  <h1>NIKE</h1>
  <p>SNDR · AR TRY-ON</p>
  <div id="bar-wrap"><div id="bar"></div></div>
  <div id="load-txt" id="ltxt">Starting camera...</div>
</div>

<video id="vid" playsinline autoplay muted></video>
<canvas id="c"></canvas>

<div id="ui">
  <div id="top">
    <div class="brand">NIKE</div>
    <div class="sub">SNDR · AR TRY-ON</div>
  </div>
  <div id="bottom">
    <div id="hint">1 FINGER: ROTATE &nbsp;|&nbsp; 2 FINGERS: MOVE + SCALE</div>
    <div id="controls">
      <span>SIZE</span>
      <input type="range" id="sz" min="10" max="500" value="100">
      <button id="resetBtn">RESET</button>
    </div>
  </div>
</div>

<div id="colors">
  <div class="sw on" style="background:#f0f0f0" data-h="0xf0f0f0"></div>
  <div class="sw" style="background:#cc2222" data-h="0xcc2222"></div>
  <div class="sw" style="background:#1a44cc" data-h="0x1a44cc"></div>
  <div class="sw" style="background:#111" data-h="0x111111"></div>
  <div class="sw" style="background:#ff6600" data-h="0xff6600"></div>
  <div class="sw" style="background:#22aa44" data-h="0x22aa44"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const vid = document.getElementById('vid');
const cnv = document.getElementById('c');
const bar = document.getElementById('bar');
const ltxt = document.getElementById('load-txt');
const hint = document.getElementById('hint');
const sz = document.getElementById('sz');
const resetBtn = document.getElementById('resetBtn');

// ── State ──────────────────────────────────────────────
let shoe = null;
let baseS = 1;
let userS = 1;
let px = 0, py = 0;        // position
let rx = 0, ry = 0;        // rotation in radians

// Touch tracking
let t1x = 0, t1y = 0;      // last single-touch pos
let t2dist = 0;             // last pinch distance
let t2cx = 0, t2cy = 0;    // last 2-finger center

// ── Three.js setup ─────────────────────────────────────
const scene = new THREE.Scene();
const cam = new THREE.PerspectiveCamera(50, innerWidth/innerHeight, 0.001, 200);
cam.position.set(0, 0, 3);

const renderer = new THREE.WebGLRenderer({ canvas: cnv, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0, 0);
renderer.shadowMap.enabled = true;

// Lighting
scene.add(new THREE.AmbientLight(0xffffff, 1.2));
const sun = new THREE.DirectionalLight(0xffffff, 2);
sun.position.set(2, 5, 3);
sun.castShadow = true;
scene.add(sun);
scene.add(Object.assign(new THREE.DirectionalLight(0xaaccff, 0.6), { position: new THREE.Vector3(-3,2,-2) }));

// Shadow plane
const sPlane = new THREE.Mesh(new THREE.PlaneGeometry(10,10), new THREE.ShadowMaterial({ opacity:0.25 }));
sPlane.rotation.x = -Math.PI/2;
sPlane.position.y = -0.5;
sPlane.receiveShadow = true;
scene.add(sPlane);

// ── Camera stream ──────────────────────────────────────
(async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' } }, audio: false
    });
    vid.srcObject = stream;
    await vid.play();
    bar.style.width = '40%';
    ltxt.textContent = 'Loading shoe model...';
    loadShoe();
  } catch(e) {
    ltxt.textContent = 'Camera access denied. Please reload and allow camera.';
  }
})();

// ── Load GLB ───────────────────────────────────────────
function loadShoe() {
  const s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js';
  s.onload = () => {
    new THREE.GLTFLoader().load('Nike_SNDR_3d.glb', gltf => {
      const root = gltf.scene;

      // fit into ~1 unit
      const box = new THREE.Box3().setFromObject(root);
      const siz = box.getSize(new THREE.Vector3());
      baseS = 1 / Math.max(siz.x, siz.y, siz.z);
      const cen = box.getCenter(new THREE.Vector3());
      root.position.sub(cen);                    // center pivot
      root.position.y += siz.y * 0.5 * baseS;   // lift to ground

      root.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });

      shoe = root;
      scene.add(shoe);
      bar.style.width = '100%';
      setTimeout(() => document.getElementById('loading').style.display = 'none', 400);
    },
    p => { if (p.total) { bar.style.width = 40 + (p.loaded/p.total*55) + '%'; } },
    e => { ltxt.textContent = 'Failed to load model.'; console.error(e); });
  };
  document.head.appendChild(s);
}

// ── Render loop ────────────────────────────────────────
(function loop() {
  requestAnimationFrame(loop);
  if (shoe) {
    const s = baseS * userS;
    shoe.scale.setScalar(s);
    shoe.position.x = px;
    shoe.position.y = py;
    shoe.rotation.x = rx;
    shoe.rotation.y = ry;
  }
  renderer.render(scene, cam);
})();

// ── Touch handlers ─────────────────────────────────────
function dist2(t) {
  return Math.hypot(t[0].clientX - t[1].clientX, t[0].clientY - t[1].clientY);
}
function center2(t) {
  return { x: (t[0].clientX + t[1].clientX) * 0.5, y: (t[0].clientY + t[1].clientY) * 0.5 };
}

cnv.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    t1x = e.touches[0].clientX;
    t1y = e.touches[0].clientY;
  } else if (e.touches.length === 2) {
    t2dist = dist2(e.touches);
    const c = center2(e.touches);
    t2cx = c.x; t2cy = c.y;
  }
}, { passive: false });

cnv.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    // ── ROTATE ──
    const dx = e.touches[0].clientX - t1x;
    const dy = e.touches[0].clientY - t1y;
    ry += dx * 0.015;   // left-right = Y axis rotation
    rx += dy * 0.015;   // up-down    = X axis rotation
    t1x = e.touches[0].clientX;
    t1y = e.touches[0].clientY;
    hint.textContent = 'ROTATING...';
  } else if (e.touches.length === 2) {
    // ── PINCH SCALE ──
    const d = dist2(e.touches);
    const ratio = d / t2dist;
    userS *= ratio;
    userS = Math.max(0.05, userS); // only min, no max
    t2dist = d;
    sz.value = Math.min(500, Math.round(userS * 100));

    // ── 2-FINGER DRAG = MOVE ──
    const c = center2(e.touches);
    const mdx = (c.x - t2cx) / innerWidth  * 4;
    const mdy = (c.y - t2cy) / innerHeight * 4;
    px += mdx;
    py -= mdy;
    t2cx = c.x; t2cy = c.y;
    hint.textContent = 'MOVING / SCALING...';
  }
}, { passive: false });

cnv.addEventListener('touchend', e => {
  e.preventDefault();
  hint.textContent = '1 FINGER: ROTATE  |  2 FINGERS: MOVE + SCALE';
  if (e.touches.length === 1) {
    t1x = e.touches[0].clientX;
    t1y = e.touches[0].clientY;
  }
}, { passive: false });

// ── Slider ─────────────────────────────────────────────
sz.addEventListener('input', () => { userS = sz.value / 100; });

// ── Reset ──────────────────────────────────────────────
resetBtn.addEventListener('click', () => {
  px = 0; py = 0; rx = 0; ry = 0; userS = 1; sz.value = 100;
});

// ── Color swatches ─────────────────────────────────────
document.querySelectorAll('.sw').forEach(sw => {
  sw.addEventListener('click', () => {
    document.querySelectorAll('.sw').forEach(s => s.classList.remove('on'));
    sw.classList.add('on');
    if (!shoe) return;
    const col = new THREE.Color(parseInt(sw.dataset.h, 16));
    shoe.traverse(c => {
      if (c.isMesh) {
        const mats = Array.isArray(c.material) ? c.material : [c.material];
        mats.forEach(m => { if (m.color) { m.color.set(col); m.needsUpdate = true; } });
      }
    });
  });
});

// ── Resize ─────────────────────────────────────────────
window.addEventListener('resize', () => {
  cam.aspect = innerWidth / innerHeight;
  cam.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
