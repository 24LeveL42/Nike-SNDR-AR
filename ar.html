<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Nike SNDR – AR Try-On</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { background: #000; font-family: 'Arial', sans-serif; overflow: hidden; }

    #loading-screen {
      position: fixed; inset: 0; background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 999; color: #fff;
    }
    #loading-screen .logo { font-size: 2rem; font-weight: 900; letter-spacing: 4px; margin-bottom: 8px; }
    #loading-screen .sub { font-size: 0.75rem; letter-spacing: 6px; color: #888; margin-bottom: 40px; text-transform: uppercase; }
    .loader-bar { width: 200px; height: 2px; background: #222; border-radius: 2px; overflow: hidden; }
    .loader-fill { height: 100%; width: 0%; background: #e8ff00; transition: width 0.3s ease; }
    #loading-screen .hint { margin-top: 20px; font-size: 0.7rem; color: #555; letter-spacing: 2px; }

    video#bg-video { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
    canvas#three-canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 1; background: transparent; touch-action: none; }

    #ui-overlay { position: fixed; inset: 0; pointer-events: none; z-index: 10; }

    #top-bar {
      position: absolute; top: 0; left: 0; right: 0;
      padding: 20px 24px 16px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
      display: flex; align-items: center; justify-content: space-between;
    }
    #top-bar .brand { font-size: 1.1rem; font-weight: 900; letter-spacing: 3px; color: #fff; }
    #top-bar .model { font-size: 0.65rem; letter-spacing: 4px; color: #aaa; margin-top: 2px; }

    /* Color swatches */
    #color-panel {
      position: absolute; top: 90px; right: 20px;
      display: flex; flex-direction: column; gap: 10px;
      pointer-events: auto;
    }
    .swatch {
      width: 38px; height: 38px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.6);
      cursor: pointer;
    }
    .swatch.active { border-color: #e8ff00; box-shadow: 0 0 0 2px rgba(232,255,0,0.4); }
    .swatch.white { background: #f5f5f5; }
    .swatch.red { background: #d62828; }
    .swatch.blue { background: #1d4ed8; }
    .swatch.black { background: #111; }
    .swatch.orange { background: #ff6b00; }

    #bottom-bar {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 16px 24px 40px;
      background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      pointer-events: auto;
    }

    #scan-hint {
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 100px; padding: 10px 20px;
    }
    .pulse-dot { width: 8px; height: 8px; border-radius: 50%; background: #e8ff00; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(0.6); } }
    #scan-hint span { font-size: 0.68rem; letter-spacing: 2px; color: #ddd; }

    #scale-row {
      display: flex; align-items: center; gap: 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 100px; padding: 8px 18px;
      width: 100%; max-width: 320px;
    }
    #scale-row span { font-size: 0.6rem; letter-spacing: 2px; color: #999; white-space: nowrap; }
    #scale-slider { flex: 1; accent-color: #e8ff00; }

    .reset-btn {
      background: #e8ff00; color: #000; border: none;
      font-size: 0.65rem; font-weight: 900; letter-spacing: 2px;
      padding: 10px 22px; border-radius: 100px; text-transform: uppercase;
    }

    #error-screen {
      display: none; position: fixed; inset: 0; background: #000;
      color: #fff; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 40px; z-index: 999;
    }
    #error-screen h2 { font-size: 1.2rem; margin-bottom: 12px; letter-spacing: 2px; }
    #error-screen p { font-size: 0.8rem; color: #888; line-height: 1.8; }
  </style>
</head>
<body>

<div id="loading-screen">
  <div class="logo">NIKE</div>
  <div class="sub">SNDR · AR Try-On</div>
  <div class="loader-bar"><div class="loader-fill" id="loader-fill"></div></div>
  <div class="hint" id="load-hint">Starting camera...</div>
</div>

<video id="bg-video" playsinline autoplay muted></video>
<canvas id="three-canvas"></canvas>

<div id="ui-overlay">
  <div id="top-bar">
    <div>
      <div class="brand">NIKE</div>
      <div class="model">SNDR · AR TRY-ON</div>
    </div>
  </div>

  <div id="color-panel">
    <div class="swatch white active" data-color="0xf5f5f5"></div>
    <div class="swatch red" data-color="0xd62828"></div>
    <div class="swatch blue" data-color="0x1d4ed8"></div>
    <div class="swatch black" data-color="0x111111"></div>
    <div class="swatch orange" data-color="0xff6b00"></div>
  </div>

  <div id="bottom-bar">
    <div id="scan-hint">
      <div class="pulse-dot"></div>
      <span id="hint-text">PINCH TO RESIZE · DRAG TO MOVE</span>
    </div>
    <div id="scale-row">
      <span>SIZE</span>
      <input type="range" id="scale-slider" min="50" max="200" value="100">
    </div>
    <div class="reset-btn" id="reset-btn">Reset Position</div>
  </div>
</div>

<div id="error-screen">
  <h2>CAMERA ACCESS NEEDED</h2>
  <p>Please allow camera access and reload the page to experience the AR try-on.</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const loadHint = document.getElementById('load-hint');
const loaderFill = document.getElementById('loader-fill');
const loadingScreen = document.getElementById('loading-screen');
const errorScreen = document.getElementById('error-screen');
const videoEl = document.getElementById('bg-video');
const canvasEl = document.getElementById('three-canvas');
const scaleSlider = document.getElementById('scale-slider');
const resetBtn = document.getElementById('reset-btn');
const hintText = document.getElementById('hint-text');

let scene, camera, renderer, shoe;
let baseScale = 0.4;
let userScale = 1.0;       // from pinch/slider
let posX = 0, posY = -0.15, posZ = 0;

// Drag state
let isDragging = false;
let lastTouchX = 0, lastTouchY = 0;

// Pinch state
let isPinching = false;
let lastPinchDist = 0;

async function init() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    videoEl.srcObject = stream;
    await videoEl.play();
    loaderFill.style.width = '40%';
    loadHint.textContent = 'Loading 3D model...';
    setupThree();
    loadShoe();
  } catch(e) {
    loadingScreen.style.display = 'none';
    errorScreen.style.display = 'flex';
  }
}

function setupThree() {
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 100);
  camera.position.set(0, 1.5, 2);
  camera.lookAt(0, 0, 0);

  renderer = new THREE.WebGLRenderer({ canvas: canvasEl, antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.setClearColor(0x000000, 0);

  const ambient = new THREE.AmbientLight(0xffffff, 1.0);
  scene.add(ambient);
  const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
  dirLight.position.set(3, 6, 4);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.width = 1024;
  dirLight.shadow.mapSize.height = 1024;
  scene.add(dirLight);
  const fillLight = new THREE.DirectionalLight(0xffeedd, 0.5);
  fillLight.position.set(-3, 2, -2);
  scene.add(fillLight);

  const groundGeo = new THREE.PlaneGeometry(4, 4);
  const groundMat = new THREE.ShadowMaterial({ opacity: 0.3 });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);

  // ── Touch handling: 1 finger = drag, 2 fingers = pinch ──
  canvasEl.addEventListener('touchstart', onTouchStart, { passive: false });
  canvasEl.addEventListener('touchmove', onTouchMove, { passive: false });
  canvasEl.addEventListener('touchend', onTouchEnd, { passive: false });

  // Mouse fallback for desktop testing
  canvasEl.addEventListener('mousedown', (e) => { isDragging = true; lastTouchX = e.clientX; lastTouchY = e.clientY; });
  canvasEl.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    const dx = (e.clientX - lastTouchX) / window.innerWidth;
    const dy = (e.clientY - lastTouchY) / window.innerHeight;
    posX += dx * 1.5;
    posY -= dy * 1.5;
    lastTouchX = e.clientX; lastTouchY = e.clientY;
  });
  window.addEventListener('mouseup', () => isDragging = false);

  scaleSlider.addEventListener('input', () => {
    userScale = scaleSlider.value / 100;
  });

  resetBtn.addEventListener('click', () => {
    posX = 0; posY = -0.15; posZ = 0;
    userScale = 1.0;
    scaleSlider.value = 100;
  });

  // Color swatches
  document.querySelectorAll('.swatch').forEach(sw => {
    sw.addEventListener('click', () => {
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
      sw.classList.add('active');
      const colorHex = parseInt(sw.dataset.color, 16);
      applyColor(colorHex);
    });
  });

  window.addEventListener('resize', onResize);
  animate();
}

function applyColor(hex) {
  if (!shoe) return;
  shoe.traverse(child => {
    if (child.isMesh && child.material) {
      const mats = Array.isArray(child.material) ? child.material : [child.material];
      mats.forEach(mat => {
        if (mat.color) {
          mat.color.setHex(hex);
        }
      });
    }
  });
}

function getTouchDist(touches) {
  const dx = touches[0].clientX - touches[1].clientX;
  const dy = touches[0].clientY - touches[1].clientY;
  return Math.sqrt(dx*dx + dy*dy);
}

function onTouchStart(e) {
  e.preventDefault();
  if (e.touches.length === 1) {
    isDragging = true;
    isPinching = false;
    lastTouchX = e.touches[0].clientX;
    lastTouchY = e.touches[0].clientY;
  } else if (e.touches.length === 2) {
    isDragging = false;
    isPinching = true;
    lastPinchDist = getTouchDist(e.touches);
  }
}

function onTouchMove(e) {
  e.preventDefault();
  if (isPinching && e.touches.length === 2) {
    const dist = getTouchDist(e.touches);
    const delta = dist - lastPinchDist;
    userScale = THREE.MathUtils.clamp(userScale + delta * 0.003, 0.5, 2.0);
    scaleSlider.value = Math.round(userScale * 100);
    lastPinchDist = dist;
    hintText.textContent = 'RESIZING...';
  } else if (isDragging && e.touches.length === 1) {
    const dx = (e.touches[0].clientX - lastTouchX) / window.innerWidth;
    const dy = (e.touches[0].clientY - lastTouchY) / window.innerHeight;
    posX += dx * 1.5;
    posY -= dy * 1.5;
    lastTouchX = e.touches[0].clientX;
    lastTouchY = e.touches[0].clientY;
    hintText.textContent = 'MOVING SHOE...';
  }
}

function onTouchEnd(e) {
  if (e.touches.length === 0) {
    isDragging = false;
    isPinching = false;
    hintText.textContent = 'PINCH TO RESIZE · DRAG TO MOVE';
  } else if (e.touches.length === 1) {
    isPinching = false;
    isDragging = true;
    lastTouchX = e.touches[0].clientX;
    lastTouchY = e.touches[0].clientY;
  }
}

function animate() {
  requestAnimationFrame(animate);
  if (shoe) {
    shoe.position.set(posX, posY, posZ);
    const finalScale = baseScale * userScale;
    shoe.scale.set(finalScale, finalScale, finalScale);
  }
  renderer.render(scene, camera);
}

function loadShoe() {
  const script = document.createElement('script');
  script.src = 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js';
  script.onload = () => {
    const loader = new THREE.GLTFLoader();
    loader.load(
      'Nike_SNDR_3d.glb',
      (gltf) => {
        shoe = gltf.scene;

        const box = new THREE.Box3().setFromObject(shoe);
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        baseScale = 0.45 / maxDim;

        // Re-center pivot to bottom-center of model
        const center = box.getCenter(new THREE.Vector3());
        shoe.children.forEach(c => {});
        const wrapper = new THREE.Group();
        shoe.position.set(-center.x, -box.min.y, -center.z);
        wrapper.add(shoe);
        wrapper.scale.setScalar(baseScale);
        scene.remove(shoe);
        shoe = wrapper;

        shoe.traverse(child => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
            if (child.material) {
              const mats = Array.isArray(child.material) ? child.material : [child.material];
              mats.forEach(m => { m.needsUpdate = true; });
            }
          }
        });

        scene.add(shoe);
        loaderFill.style.width = '100%';
        setTimeout(() => { loadingScreen.style.display = 'none'; }, 500);
      },
      (progress) => {
        if (progress.total > 0) {
          const pct = 40 + Math.round((progress.loaded / progress.total) * 55);
          loaderFill.style.width = pct + '%';
          loadHint.textContent = `Loading model... ${Math.round(pct)}%`;
        }
      },
      (err) => {
        loadHint.textContent = 'Error loading model.';
        console.error(err);
      }
    );
  };
  document.head.appendChild(script);
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

init();
</script>
</body>
</html>
