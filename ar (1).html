<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Nike SNDR – AR Try-On</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; font-family: 'Arial', sans-serif; overflow: hidden; }

    #loading-screen {
      position: fixed; inset: 0; background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 999; color: #fff;
    }
    #loading-screen .logo {
      font-size: 2rem; font-weight: 900; letter-spacing: 4px;
      color: #fff; margin-bottom: 8px;
    }
    #loading-screen .sub {
      font-size: 0.75rem; letter-spacing: 6px; color: #888;
      margin-bottom: 40px; text-transform: uppercase;
    }
    .loader-bar {
      width: 200px; height: 2px; background: #222; border-radius: 2px; overflow: hidden;
    }
    .loader-fill {
      height: 100%; width: 0%; background: #e8ff00;
      transition: width 0.3s ease;
    }
    #loading-screen .hint {
      margin-top: 20px; font-size: 0.7rem; color: #555; letter-spacing: 2px;
    }

    #ar-container { position: fixed; inset: 0; }

    video#bg-video {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; z-index: 0;
    }

    canvas#three-canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 1;
      background: transparent;
    }

    #ui-overlay {
      position: fixed; inset: 0; pointer-events: none; z-index: 10;
    }

    #top-bar {
      position: absolute; top: 0; left: 0; right: 0;
      padding: 20px 24px 16px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
      display: flex; align-items: center; justify-content: space-between;
    }
    #top-bar .brand { font-size: 1.1rem; font-weight: 900; letter-spacing: 3px; color: #fff; }
    #top-bar .model { font-size: 0.65rem; letter-spacing: 4px; color: #aaa; margin-top: 2px; }

    #bottom-bar {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 20px 24px 48px;
      background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
      display: flex; flex-direction: column; align-items: center; gap: 12px;
    }

    #scan-hint {
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 100px; padding: 10px 20px;
    }
    .pulse-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #e8ff00;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.3; transform: scale(0.6); }
    }
    #scan-hint span { font-size: 0.72rem; letter-spacing: 2px; color: #ddd; }

    #status-msg {
      font-size: 0.65rem; letter-spacing: 3px; color: #888;
      text-transform: uppercase; text-align: center;
    }

    /* tap ripple */
    .tap-ripple {
      position: fixed; pointer-events: none; z-index: 20;
      width: 60px; height: 60px; margin-left: -30px; margin-top: -30px;
      border-radius: 50%; border: 2px solid #e8ff00;
      animation: ripple 0.5s ease-out forwards;
    }
    @keyframes ripple {
      from { opacity: 1; transform: scale(0.5); }
      to   { opacity: 0; transform: scale(1.5); }
    }

    .bracket {
      position: absolute; width: 44px; height: 44px;
      border-color: rgba(255,255,255,0.25); border-style: solid;
    }
    .bracket.tl { top: 80px; left: 20px; border-width: 2px 0 0 2px; }
    .bracket.tr { top: 80px; right: 20px; border-width: 2px 2px 0 0; }
    .bracket.bl { bottom: 150px; left: 20px; border-width: 0 0 2px 2px; }
    .bracket.br { bottom: 150px; right: 20px; border-width: 0 2px 2px 0; }

    #error-screen {
      display: none; position: fixed; inset: 0; background: #000;
      color: #fff; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 40px; z-index: 999;
    }
    #error-screen h2 { font-size: 1.2rem; margin-bottom: 12px; letter-spacing: 2px; }
    #error-screen p { font-size: 0.8rem; color: #888; line-height: 1.8; }
  </style>
</head>
<body>

<div id="loading-screen">
  <div class="logo">NIKE</div>
  <div class="sub">SNDR · AR Try-On</div>
  <div class="loader-bar"><div class="loader-fill" id="loader-fill"></div></div>
  <div class="hint" id="load-hint">Starting camera...</div>
</div>

<video id="bg-video" playsinline autoplay muted></video>
<canvas id="three-canvas"></canvas>

<div id="ui-overlay">
  <div id="top-bar">
    <div>
      <div class="brand">NIKE</div>
      <div class="model">SNDR · AR TRY-ON</div>
    </div>
  </div>
  <div class="bracket tl"></div>
  <div class="bracket tr"></div>
  <div class="bracket bl"></div>
  <div class="bracket br"></div>
  <div id="bottom-bar">
    <div id="scan-hint">
      <div class="pulse-dot"></div>
      <span id="hint-text">POINT CAMERA AT YOUR FEET</span>
    </div>
    <div id="status-msg">TAP SCREEN TO PLACE SHOE</div>
  </div>
</div>

<div id="error-screen">
  <h2>CAMERA ACCESS NEEDED</h2>
  <p>Please allow camera access and reload the page to experience the AR try-on.</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const loadHint = document.getElementById('load-hint');
const loaderFill = document.getElementById('loader-fill');
const loadingScreen = document.getElementById('loading-screen');
const errorScreen = document.getElementById('error-screen');
const statusMsg = document.getElementById('status-msg');
const hintText = document.getElementById('hint-text');
const videoEl = document.getElementById('bg-video');
const canvasEl = document.getElementById('three-canvas');

let scene, camera, renderer, shoe;
let isPlaced = false;
// Target position for smooth movement
let targetX = 0, targetY = 0, targetZ = 0;
let currentX = 0, currentY = -0.3, currentZ = 0;

// Device orientation for tilt-based movement
let tiltX = 0, tiltZ = 0;
let orientationActive = false;

async function init() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    videoEl.srcObject = stream;
    await videoEl.play();
    loaderFill.style.width = '40%';
    loadHint.textContent = 'Loading 3D model...';
    setupThree();
    loadShoe();
  } catch(e) {
    loadingScreen.style.display = 'none';
    errorScreen.style.display = 'flex';
  }
}

function setupThree() {
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 100);
  camera.position.set(0, 1.5, 2);
  camera.lookAt(0, 0, 0);

  renderer = new THREE.WebGLRenderer({ canvas: canvasEl, antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.setClearColor(0x000000, 0); // transparent

  // Lighting
  const ambient = new THREE.AmbientLight(0xffffff, 1.0);
  scene.add(ambient);
  const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
  dirLight.position.set(3, 6, 4);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.width = 1024;
  dirLight.shadow.mapSize.height = 1024;
  scene.add(dirLight);
  const fillLight = new THREE.DirectionalLight(0xffeedd, 0.5);
  fillLight.position.set(-3, 2, -2);
  scene.add(fillLight);

  // Shadow plane
  const groundGeo = new THREE.PlaneGeometry(4, 4);
  const groundMat = new THREE.ShadowMaterial({ opacity: 0.3 });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);

  // Tap to place
  canvasEl.addEventListener('touchstart', onTap, { passive: true });
  canvasEl.addEventListener('click', onTap);

  // Device orientation for subtle tilt tracking
  if (window.DeviceOrientationEvent) {
    window.addEventListener('deviceorientation', onOrientation);
  }

  window.addEventListener('resize', onResize);
  animate();
}

function onOrientation(e) {
  if (e.gamma !== null && e.beta !== null) {
    orientationActive = true;
    // gamma = left/right tilt (-90 to 90), beta = front/back tilt
    tiltX = THREE.MathUtils.clamp(e.gamma / 90, -0.5, 0.5);
    tiltZ = THREE.MathUtils.clamp((e.beta - 45) / 90, -0.5, 0.5);
  }
}

function onTap(e) {
  if (!shoe) return;
  isPlaced = true;
  // Show ripple
  const touch = e.touches ? e.touches[0] : e;
  const ripple = document.createElement('div');
  ripple.className = 'tap-ripple';
  ripple.style.left = touch.clientX + 'px';
  ripple.style.top = touch.clientY + 'px';
  document.body.appendChild(ripple);
  setTimeout(() => ripple.remove(), 600);

  statusMsg.textContent = 'MOVE PHONE TO FOLLOW YOUR FOOT';
  hintText.textContent = 'TAP TO REPOSITION';
}

function animate() {
  requestAnimationFrame(animate);

  if (shoe) {
    if (isPlaced && orientationActive) {
      // Smoothly follow tilt
      targetX = tiltX * 0.8;
      targetZ = tiltZ * 0.5;
    } else if (!isPlaced) {
      // Gentle float before placement
      const t = Date.now() * 0.001;
      targetY = Math.sin(t * 1.2) * 0.04 - 0.05;
      // slow spin before placed
      shoe.rotation.y += 0.008;
    }

    if (isPlaced) {
      // Stop spin, lock upright
      shoe.rotation.y = THREE.MathUtils.lerp(shoe.rotation.y, 0, 0.05);
    }

    // Smooth interpolation
    currentX = THREE.MathUtils.lerp(currentX, targetX, 0.08);
    currentY = THREE.MathUtils.lerp(currentY, isPlaced ? 0 : targetY, 0.08);
    currentZ = THREE.MathUtils.lerp(currentZ, targetZ, 0.08);

    shoe.position.set(currentX, currentY, currentZ);
  }

  renderer.render(scene, camera);
}

function loadShoe() {
  const script = document.createElement('script');
  script.src = 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js';
  script.onload = () => {
    const loader = new THREE.GLTFLoader();
    loader.load(
      'Nike_SNDR_3d.glb',
      (gltf) => {
        shoe = gltf.scene;

        // Scale to good size
        const box = new THREE.Box3().setFromObject(shoe);
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 0.4 / maxDim;
        shoe.scale.setScalar(scale);

        // Sit on ground
        const box2 = new THREE.Box3().setFromObject(shoe);
        shoe.position.y = -box2.min.y * scale;

        shoe.traverse(child => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
          }
        });

        scene.add(shoe);
        loaderFill.style.width = '100%';

        setTimeout(() => {
          loadingScreen.style.display = 'none';
        }, 600);
      },
      (progress) => {
        if (progress.total > 0) {
          const pct = 40 + Math.round((progress.loaded / progress.total) * 55);
          loaderFill.style.width = pct + '%';
          loadHint.textContent = `Loading model... ${Math.round(pct)}%`;
        }
      },
      (err) => {
        loadHint.textContent = 'Error loading model.';
        console.error(err);
      }
    );
  };
  document.head.appendChild(script);
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

init();
</script>
</body>
</html>
